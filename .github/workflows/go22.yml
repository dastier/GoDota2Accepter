name: Go CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          libc6-dev \
          libgtk-3-dev \
          libappindicator3-dev \
          libpng++-dev \
          xauth \
          xorg-dev \
          xvfb

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
      env:
        GOLANGCI_LINT_SKIP_GO_VERSION_CHECK: "1"

    - name: Check module tidiness
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Build
      run: go build -v ./...

    - name: Test
      run: xvfb-run -a go test -v ./...
