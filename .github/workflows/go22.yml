name: Go CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          gir1.2-appindicator3-0.1 \
          libc6-dev \
          libappindicator3-dev \
          libpng++-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb-xkb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libxtst-dev \
          xauth \
          x11-xkb-utils \
          xcb \
          xorg-dev \
          xvfb

    - name: Check module tidiness
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Build
      run: go build -v ./...

    - name: Test
      run: xvfb-run -a go test -v ./...
