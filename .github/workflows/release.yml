name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libc6-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libpng++-dev \
            xauth \
            xorg-dev \
            xvfb

      - name: Install cross-compiler (arm64)
        if: matrix.goarch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: xvfb-run -a go test -v ./...

      - name: Build binary
        run: |
          mkdir -p dist/package
          GOARCH=${{ matrix.goarch }} \
          CC=${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }} \
          CGO_ENABLED=1 \
          go build -trimpath -ldflags="-s -w" -o dist/package/GoDota2Accepter .

      - name: Package binary
        run: |
          cp README.md dist/package/
          cp LICENSE dist/package/
          mkdir -p dist/package/assets
          cp assets/*.svg dist/package/assets/
          tar -C dist/package -czf "dist/GoDota2Accepter-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz" GoDota2Accepter README.md LICENSE assets
          cd dist
          sha256sum "GoDota2Accepter-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz" > "GoDota2Accepter-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          files="GoDota2Accepter-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz GoDota2Accepter-${GITHUB_REF_NAME}-linux-${{ matrix.goarch }}.tar.gz.sha256"
          gh release create "$GITHUB_REF_NAME" $files --generate-notes --verify-tag 2>/dev/null || \
          gh release upload "$GITHUB_REF_NAME" $files --clobber
